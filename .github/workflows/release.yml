name: Release

# Manual, on-demand publishing. Choose the platform and (for Android) the
# Play track from the "Run workflow" dialog in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform(s) to build and publish
        type: choice
        options: [both, android, ios]
        default: both
      play_track:
        description: "Google Play track (Android only)"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal
      version_name:
        description: "Version name override, e.g. 1.2.0 (default: pubspec version)"
        type: string
        required: false
      build_number:
        description: "Build number override (default: GitHub run number)"
        type: string
        required: false

# Never run two releases concurrently — build numbers must stay ordered.
concurrency:
  group: release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.44.5"

jobs:
  # --------------------------------------------------------------------------
  # ANDROID  ->  Google Play track  +  GitHub Release artifact
  # --------------------------------------------------------------------------
  android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    name: Android → Play (${{ github.event.inputs.play_track }}) + Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        run: |
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          [ -z "$BUILD_NUMBER" ] && BUILD_NUMBER="${{ github.run_number }}"
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d '[:space:]')
          fi
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION_NAME ($BUILD_NUMBER)"

      - name: Decode keystore and write key.properties
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=${{ github.workspace }}/android/app/upload-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations + code
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Build App Bundle (AAB)
        run: >-
          flutter build appbundle --release
          --build-name=${{ steps.ver.outputs.version_name }}
          --build-number=${{ steps.ver.outputs.build_number }}

      - name: Build APK (for the GitHub Release)
        run: >-
          flutter build apk --release
          --build-name=${{ steps.ver.outputs.version_name }}
          --build-number=${{ steps.ver.outputs.build_number }}

      # Attach the raw outputs to the workflow run first — this always succeeds
      # (even if a later publishing step fails) so the AAB/APK are downloadable
      # from the Actions run page regardless of Play/Release outcomes.
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.ver.outputs.version_name }}-${{ steps.ver.outputs.build_number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      # Create the GitHub Release before the Play upload, so a Play failure
      # (e.g. the app not yet created in the Play Console) never blocks it.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version_name }}+${{ steps.ver.outputs.build_number }}
          name: v${{ steps.ver.outputs.version_name }} (build ${{ steps.ver.outputs.build_number }})
          generate_release_notes: true
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.jwscheduler.congregation_scheduler
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.play_track }}
          # Production releases go up as a draft to be reviewed/rolled out by a
          # human in the Play Console. Other tracks publish immediately.
          status: ${{ github.event.inputs.play_track == 'production' && 'draft' || 'completed' }}

  # --------------------------------------------------------------------------
  # iOS  ->  App Store Connect / TestFlight
  # --------------------------------------------------------------------------
  ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    name: iOS → TestFlight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        run: |
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          [ -z "$BUILD_NUMBER" ] && BUILD_NUMBER="${{ github.run_number }}"
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d '[:space:]')
          fi
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION_NAME ($BUILD_NUMBER)"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        id: profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_B64" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          cp /tmp/profile.mobileprovision "$PROFILE_DIR/$UUID.mobileprovision"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Installed provisioning profile: $NAME ($UUID)"

      - name: Configure manual signing for the archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          {
            echo ""
            echo "CODE_SIGN_STYLE=Manual"
            echo "DEVELOPMENT_TEAM=$TEAM_ID"
            echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution"
          } >> ios/Flutter/Release.xcconfig

      - name: Write ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>$TEAM_ID</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>uploadSymbols</key>
          <true/>
          <key>provisioningProfiles</key>
          <dict>
          <key>org.jwscheduler.congregationScheduler</key>
          <string>$PROFILE_NAME</string>
          </dict>
          </dict>
          </plist>
          EOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile') }}-${{ env.FLUTTER_VERSION }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations + code
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Build signed IPA
        run: >-
          flutter build ipa --release
          --build-name=${{ steps.ver.outputs.version_name }}
          --build-number=${{ steps.ver.outputs.build_number }}
          --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
