name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.5"

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run code generation (freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: >-
          dart format --output=none --set-exit-if-changed
          $(git ls-files '*.dart' ':!:**/*.g.dart' ':!:**/*.freezed.dart' ':!:lib/l10n/generated/**')

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rules-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rules-tests/package-lock.json

      # The Firestore emulator (launched by `firebase emulators:exec`) is a Java process.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run rules tests
        run: npm test
